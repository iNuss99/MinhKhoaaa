<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <table>
      <from>
        <tr>
          <td><label for="">Họ Tên:</label></td>
          <td><input type="text" placeholder="Họ Tên" /></td>
        </tr>

        <tr>
          <td><label for="">Email:</label></td>
          <td><input type="email" placeholder="Email" /></td>
        </tr>
        <tr>
          <td><label for="">Thời gian tham gia:</label></td>
          <td><input type="datetime-local" /></td>
        </tr>
        <tr>
          <td><label for="">Giới tính:</label></td>
          <td>
            <input type="radio" id="male" name="gt" />
            <label for="male">Nam</label>
            <input type="radio" id="female" name="gt" />
            <label for="female">Nữ</label>
          </td>
        </tr>
        <tr>
          <td><label for="">Sở thích:</label></td>
          <td>
            <input type="checkbox" id="pre1" />
            <label for="pre1">Ăn uống</label>
            <input type="checkbox" id="pre2" />
            <label for="pre2">Du lịch</label>
            <input type="checkbox" id="pre3" />
            <label for="pre3">Thể thao</label>
          </td>
        </tr>
        <tr>
          <td colspan="2">
            <button type="submit">Xác Nhận</button>
          </td>
        </tr>
      </from>
    </table>
  </body>
</html>
