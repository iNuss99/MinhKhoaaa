<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <style>
      body {
        font-family: Arial, Arial, Helvetica, sans-serif;
      }

      .car {
        width: 300px;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 10px;
        text-align: center;
      }

      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
      }

      .name {
        font-size: 24px;
        font-weight: bold;
        margin: 10px 0;
      }
      .job {
        font-size: 20px;
        color: #03a6f1;
        margin: 5px 0;
      }
      .bio {
        font-size: 16px;
        line-height: 1.5;
        margin: 10px 0;
      }

      .skill {
        margin: 10px;
        color: red;
        text-align: left;
        display: inline-block;
      }
      .skill1 {
        padding: 5px 10px;
        color: #06f0b6;
        background-color: #d23906;
        border-radius: 10px;
      }
      .skill2 {
        padding: 5px 10px;
        margin-top: 5px;
        margin-bottom: 5px;
        color: #d51612;
        background-color: #069ce1;
        border-radius: 10px;
      }
      .skill3 {
        padding: 5px 10px;
        color: #03a6f1;
        background-color: #15e066;
        border-radius: 10px;
      }
      a {
        display: inline-block;
        padding: 10px 20px;
        background-color: #066cd8;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        transition: background-color 0.3s;
      }
      a:hover {
        background-color: #d23906;
      }
    </style>
  </head>
  <body>
    <div class="car">
      <img
        class="avatar"
        src="https://marketplace.canva.com/tXH-Q/MAG7IGtXH-Q/1/tl/canva-MAG7IGtXH-Q.jpg"
        alt="Ảnh cá nhân"
      />
      <h1 class="name">Đỗ Minh Khoa</h1>
      <p class="job">Student</p>
      <p class="bio">Tôi là học sinh, đang học tại trường cao đẳng Văn Lang.</p>

      <div class="skill">
        <strong>Kỹ năng:</strong>
        <ul>
          <li class="skill1">Học</li>
          <li class="skill2">Làm việc</li>
          <li class="skill3">Giao tiếp</li>
        </ul>
      </div>
      <br />
      <a href="#" class="contact">Liên Hệ</a>
    </div>
  </body>
</html>
