<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MENU QUÁN CÀ PHÊ</title>
    <style>
      .card {
        width: 340px;
        background-color: #030907;
        border: 2px solid #333;
        border-radius: 20px;
        padding: 20px;
        font-family: Arial, sans-serif;
      }
      .heading {
        color: rgb(255, 13, 0);
      }
      .ten {
        color: rgb(224, 204, 22);
      }
      .gia {
        color: rgb(109, 203, 109);
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #ff9800;
        color: white;
        border: none;
        border-radius: 8px;
        margin-top: 15px;
        font-size: 20px;
        transition: 0.4s;
      }
      button:hover {
        background-color: brown;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 class="heading">MENU QUÁN CÀ PHÊ</h1>
      <ul>
        <li class="ten">Cà Phê</li>
        <li class="gia">20.000 VNĐ</li>
        <li class="ten">Matcha Caramel</li>
        <li class="gia">65.000 VNĐ</li>
        <li class="ten">Sinh Tố Bơ</li>
        <li class="gia">25.000 VNĐ</li>
        <li class="ten">Trà Đào</li>
        <li class="gia">15.000 VNĐ</li>
        <li class="ten">Bia Tiger</li>
        <li class="gia">16.000 VNĐ</li>
      </ul>
      <button>Đặt Ngay</button>
    </div>
  </body>
</html>
